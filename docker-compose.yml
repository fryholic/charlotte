services:
  charlotte:
    build: .
    container_name: charlotte-bot
    restart: unless-stopped
    shm_size: '2gb'
    command: python charlotte_bot.py
    volumes:
      - type: bind
        source: .
        target: /app
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - BLOCKED_USER_IDS=${BLOCKED_USER_IDS}

